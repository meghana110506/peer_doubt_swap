<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard | Peer Doubt Swap</title>
  <link rel="stylesheet" href="../css/dashboard.css">
</head>

<body>

  <!-- ===== HEADER ===== -->
  <div class="header">
    <div class="header-left">
      <!-- SAME LOGO AS SUBJECT PAGE -->
      <img src="../images/logo.png" alt="Logo">
      <span>Peer Doubt Swap</span>
    </div>

    <div class="points">
      ⭐ <span id="points">0</span>
    </div>
  </div>

  <!-- ===== SUBJECT ===== -->
  <div class="subject-banner">
    <h2 id="subjectTitle">No Subject Selected</h2>
  </div>

  <!-- ===== ACTIONS ===== -->
  <div class="dashboard-actions">
    <button class="action-btn asker" onclick="chooseRole('asker')">
      DOUBT ASKER
    </button>

    <button class="action-btn solver" onclick="chooseRole('solver')">
      DOUBT SOLVER
    </button>
  </div>

  <script src="../js/dashboard.js"></script>
