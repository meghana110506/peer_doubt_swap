<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>DOUBT ASKER | Peer Doubt Swap</title>
    <link rel="stylesheet" href="../css/doubtAsker1.css">
</head>

<body>
    <!-- ===== HEADER ===== -->
    <div class="header">
        <div class="header-left">
            <img src="../images/logo.png" alt="Logo">
            <span>Peer Doubt Swap</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
            <div class="points">⭐ <span id="star-count">0</span></div>
            <div id="user-nav"></div>
        </div>
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="main-content">

        <!-- Subject Dropdown -->
        <div class="subject-section">
            <label for="subject-select">Subject:</label>
            <select id="subject-select" class="subject-select" required>
                <option value="">-- Select Subject --</option>
                <option value="C">C</option>
                <option value="C++">C++</option>
                <option value="Python">Python</option>
                <option value="Java">Java</option>
                <option value="JavaScript">JavaScript</option>
                <option value="SQL">SQL</option>
            </select>
        </div>

        <div class="difficulty-section">
            <label for="difficulty-select">Difficulty Level:</label>
            <select id="difficulty-select" class="difficulty-select" required>
                <option value="">-- Select Difficulty --</option>
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
            </select>
        </div>

        <div class="input-section">
            <div class="text_area">
                <textarea id="user-input" placeholder="Type your doubt here..."></textarea>
            </div>
        </div>

        <button onclick="postDoubt()" class="post-button">POST DOUBT</button>
        <p id="post-success"
            style="display:none; color:#059669; font-weight:600; text-align:center; margin-top:14px; font-size:0.97rem;">
            ✅ Doubt posted successfully!</p>
    </div>

    <script src="../js/api.js"></script>`n  <script src="../js/navbar.js"></script>
    <script src="../js/doubtAsker1.js"></script>
</body>

</html>
