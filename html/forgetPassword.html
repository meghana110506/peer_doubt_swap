<html>
    <head>
        <title>FORGET PASSWORD PAGE</title>
        <link rel="stylesheet" href="../css/style.css">
    </head>
    <body>
        <div class="login-card">
            <div class="logo-wrapper">
                <img src="../images/logo.png" alt="Logo" class="logo">
            </div>
            
            <div id="forgot-step-1">
                <h1>Reset Password</h1>
                <p style="font-size: 0.9rem; color: #666; margin-bottom: 20px;">
                Enter your email to receive a reset link.
                </p>
                <div class="input-group">
                    <label for="reset-email">E-Mail</label>
                    <input type="email" id="reset-email" placeholder="Enter your registered email">
                </div>
                <button type="button" class="btn btn-primary" onclick="showResetFields()">Send Reset Link</button>
            </div>
        
            <div id="forgot-step-2" style="display: none;">
                <h1>Create New Password</h1>
                <div class="input-group">
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" placeholder="Minimum 8 characters">
                    <div id="strength-msg" style="font-size: 0.75rem; margin-top: 5px;"></div>
                </div>
                <div class="input-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Repeat password">
                    <div id="match-msg" style="font-size: 0.75rem; margin-top: 5px;"></div>
                </div>
                <button type="button" class="btn btn-primary" onclick="handleReset()">Update Password</button>
            </div>
            <script src="../js/forgetPassword.js"></script>
        </div>
    </body>
</html>
