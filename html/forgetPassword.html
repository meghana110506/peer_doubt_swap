<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Peer Doubt Swap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/index.css">
</head>

<body>
    <main class="login-container">
        <div class="login-card">

            <div class="logo-wrapper">
                <img src="../images/logo.png" alt="Peer Doubt Swap Logo" class="logo">
            </div>

            <!-- Step 1: Enter email -->
            <div id="forgot-step-1">
                <h1>Reset Password</h1>
                <p style="font-size: 0.9rem; color: #666; margin-bottom: 24px;">
                    Enter your registered email to reset your password.
                </p>
                <div class="input-group">
                    <label for="reset-email">E-Mail</label>
                    <input type="email" id="reset-email" placeholder="Enter your registered email">
                </div>
                <button type="button" class="btn btn-primary" style="margin-top: 20px;" onclick="showResetFields()">
                    Send Reset Link
                </button>
            </div>

            <!-- Step 2: Create new password -->
            <div id="forgot-step-2" style="display: none;">
                <h1>Create New Password</h1>
                <p style="font-size: 0.9rem; color: #666; margin-bottom: 24px;">
                    Choose a strong password with at least 8 characters.
                </p>

                <div class="input-group">
                    <label for="new-password">New Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="new-password" placeholder="Minimum 8 characters">
                        <button type="button" class="password-toggle" onclick="togglePassword('new-password', this)"
                            aria-label="Show password">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                class="bi bi-eye-slash-fill" viewBox="0 0 16 16">
                                <path
                                    d="M10.79 12.912l-1.614-1.615a3.5 3.5 0 0 1-4.474-4.474l-2.06-2.06C.938 6.278 0 8 0 8s3 5.5 8 5.5a7.029 7.029 0 0 0 2.79-.588zM5.21 3.088A7.028 7.028 0 0 1 8 2.5c5 0 8 5.5 8 5.5s-.939 1.721-2.641 3.238l-2.062-2.062a3.5 3.5 0 0 0-4.474-4.474L5.21 3.089z" />
                                <path
                                    d="M5.525 7.646a2.5 2.5 0 0 0 2.829 2.829l-2.83-2.829zm4.95.708l-2.829-2.83a2.5 2.5 0 0 1 2.829 2.829zm3.171 6-12-12 .708-.708 12 12-.708.708z" />
                            </svg>
                        </button>
                    </div>
                    <div id="strength-msg" style="font-size: 0.75rem; margin-top: 5px;"></div>
                </div>

                <div class="input-group" style="margin-top: 14px;">
                    <label for="confirm-password">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirm-password" placeholder="Repeat password">
                        <button type="button" class="password-toggle" onclick="togglePassword('confirm-password', this)"
                            aria-label="Show password">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                class="bi bi-eye-slash-fill" viewBox="0 0 16 16">
                                <path
                                    d="M10.79 12.912l-1.614-1.615a3.5 3.5 0 0 1-4.474-4.474l-2.06-2.06C.938 6.278 0 8 0 8s3 5.5 8 5.5a7.029 7.029 0 0 0 2.79-.588zM5.21 3.088A7.028 7.028 0 0 1 8 2.5c5 0 8 5.5 8 5.5s-.939 1.721-2.641 3.238l-2.062-2.062a3.5 3.5 0 0 0-4.474-4.474L5.21 3.089z" />
                                <path
                                    d="M5.525 7.646a2.5 2.5 0 0 0 2.829 2.829l-2.83-2.829zm4.95.708l-2.829-2.83a2.5 2.5 0 0 1 2.829 2.829zm3.171 6-12-12 .708-.708 12 12-.708.708z" />
                            </svg>
                        </button>
                    </div>
                    <div id="match-msg" style="font-size: 0.75rem; margin-top: 5px;"></div>
                </div>

                <button type="button" class="btn btn-primary" style="margin-top: 20px;" onclick="handleReset()">
                    Update Password
                </button>
            </div>

            <script src="../js/api.js"></script>
            <script src="../js/forgetPassword.js"></script>
        </div>
    </main>
</body>

</html>
