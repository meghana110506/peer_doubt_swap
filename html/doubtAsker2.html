<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DOUBT VIEW | Peer Doubt Swap</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/doubtAsker2.css">
</head>
<body>
    <!-- ===== HEADER ===== -->
    <div class="header">
        <div class="header-left">
            <img src="../images/logo.png" alt="Logo">
            <span>Peer Doubt Swap</span>
        </div>
        <div class="points">
            ⭐ <span id="star-count">0</span>
        </div>
    </div>

    <!-- ===== SUBJECT ===== -->
    <div class="subject-banner">
        <h2 id="display-here">No Subject Selected</h2>
    </div>

    <!-- ===== QUESTION ===== -->
    <div class="question-section">
        <div id="active-question" class="question-display"></div>
    </div>

    <!-- ===== ANSWERS ===== -->
    <div class="answers-section">
        <p class="answers-title">ANSWERS / COMMENTS</p>
        <div id="answers-list"></div>
    </div>
    <script src="../js/doubtAsker2.js"></script>
</body>
</html>
