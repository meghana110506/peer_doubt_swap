<html>
<head>
  <meta charset="UTF-8">
  <title>Peer Doubt Swap - Choose Subject</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/subjectPage.css">
</head>


<!-- HEADER -->
<header class="app-header">
  <div class="app-title">Peer Doubt Swap</div>
  <img src="../images/logo.png" alt="Logo" class="app-logo">
</header>

<!-- MAIN CONTENT -->
<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">

      <div class="subject-card text-center">

        <h4 class="subject-title">Choose a Subject</h4>

        <form id="subjectForm" action="dashboard.html">
          <div class="mb-4">
            <select id="subjectSelect" class="form-select" required>
               <option value="">-- Select Subject --</option>
               <option value="C Programming">C Programming</option>
               <option value="Data Structures">Data Structures</option>
              <option value="Java">Java</option>
              <option value="Python">Python</option>
             </select>
            </div>

        <button type="submit" class="btn btn-primary px-4" >
          Next
        </button>
        </form>

      </div>

    </div>
  </div>
</div>

<script src="../js/subjectPage.js"></script>
</body>
</html>
